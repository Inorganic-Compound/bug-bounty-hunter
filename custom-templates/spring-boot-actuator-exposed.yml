id: spring-boot-actuator-exposed

info:
  name: Spring Boot Actuator Exposed
  author: BugBountyBot
  severity: high
  description: Detects exposed Spring Boot Actuator endpoints leaking environment variables, beans, and configuration. Only triggers on confirmed real actuator responses.
  tags: springboot,actuator,exposure,misconfig

http:
  - method: GET
    path:
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/actuator/env"
      - "{{BaseURL}}/actuator/beans"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        condition: or
        words:
          - '"_links"'
          - '"propertySources"'
          - '"beans"'
          - '"activeProfiles"'
        part: body

      - type: word
        words:
          - "application/json"
          - "application/vnd.spring-boot.actuator"
        part: header

      - type: word
        negative: true
        condition: or
        words:
          - "<html"
          - "<!DOCTYPE"
          - "WordPress"
          - "wpengine"
          - "404"
          - "Not Found"
          - "Access Denied"
          - "Forbidden"
          - "nginx"
          - "Apache"
        part: body

    extractors:
      - type: regex
        name: actuator_links
        part: body
        regex:
          - '"href"\s*:\s*"([^"]+actuator[^"]+)"'
