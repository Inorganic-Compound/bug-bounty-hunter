id: swagger-unauthenticated-execution

info:
  name: Swagger UI - Unauthenticated API Execution Enabled
  author: BugBountyBot
  severity: high
  description: Detects Swagger UI instances where the Try it out feature is enabled without authentication, allowing anyone to execute real API calls directly. This goes beyond just detecting Swagger is exposed — it confirms actual unauthenticated API execution is possible, which is a reportable bug on most programs.
  reference:
    - https://owasp.org/API-Security/editions/2023/en/0xa1-broken-object-level-authorization/
  tags: swagger,exposure,misconfig,api,unauth

http:
  - method: GET
    path:
      - "{{BaseURL}}/swagger-ui.html"
      - "{{BaseURL}}/swagger-ui/"
      - "{{BaseURL}}/swagger-ui/index.html"
      - "{{BaseURL}}/swagger/"
      - "{{BaseURL}}/api/swagger-ui.html"
      - "{{BaseURL}}/api/swagger-ui/"
      - "{{BaseURL}}/api/swagger/"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/v2/api-docs"
      - "{{BaseURL}}/v3/api-docs"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/openapi.yaml"
      - "{{BaseURL}}/api/openapi.json"
      - "{{BaseURL}}/api/openapi.yaml"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        condition: or
        words:
          - "swagger-ui"
          - "SwaggerUIBundle"
          - "swagger-ui-bundle"
        part: body
        case-insensitive: true

      - type: word
        condition: or
        words:
          - "Try it out"
          - "tryItOutEnabled"
          - "supportedSubmitMethods"
        part: body

      - type: word
        negative: true
        condition: or
        words:
          - "<title>Login"
          - "<title>Sign in"
          - "401 Unauthorized"
          - "403 Forbidden"
          - "Authentication Required"
        part: body

    extractors:
      - type: regex
        name: swagger_version
        part: body
        regex:
          - 'swagger-ui@([0-9.]+)'
          - '"swagger"\s*:\s*"([^"]+)"'

      - type: regex
        name: api_base_path
        part: body
        regex:
          - '"basePath"\s*:\s*"([^"]+)"'
          - '"servers"\s*:\s*\[\s*\{\s*"url"\s*:\s*"([^"]+)"'
