# scan-template.yml
name: Scan Template Engine

on:
  workflow_call:
    inputs:
      scan_name:
        required: true
        type: string
      tags:
        required: false
        type: string
        default: ''
      severity:
        required: false
        type: string
        default: 'low,medium,high,critical'
      use_katana:
        required: false
        type: boolean
        default: false
      input_file:
        required: false
        type: string
        default: 'live_hosts'
    secrets:
      EMAIL_USER:
        required: true
      EMAIL_PASS:
        required: true
      EMAIL_TO:
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # MUST be before cache step that uses it
      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-go
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v3

      - name: Install Go tools
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          go install github.com/projectdiscovery/katana/cmd/katana@latest

      - name: Cache nuclei templates
        uses: actions/cache@v4
        id: cache-templates
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: |
            nuclei-templates-${{ runner.os }}-

      - name: Download nuclei templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/.local/share/nuclei-templates
          git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git \
            $HOME/.local/share/nuclei-templates || true
          echo "Templates downloaded: $(ls $HOME/.local/share/nuclei-templates | wc -l) folders"

      - name: Verify templates
        run: echo "Templates ready: $(ls $HOME/.local/share/nuclei-templates | wc -l) folders"

      - name: Prepare input
        run: |
          INPUT="${{ inputs.input_file }}"

          if [ "$INPUT" = "live_hosts_403" ]; then
            if [ -f live_hosts_403.txt ] && [ -s live_hosts_403.txt ]; then
              cp live_hosts_403.txt input.txt
              echo "Using live_hosts_403.txt ($(wc -l < input.txt) hosts)"
            else
              echo "No 403 hosts found, skipping"
              touch input.txt
            fi

          elif [ "$INPUT" = "live_hosts_404" ]; then
            if [ -f live_hosts_404.txt ] && [ -s live_hosts_404.txt ]; then
              cp live_hosts_404.txt input.txt
              echo "Using live_hosts_404.txt ($(wc -l < input.txt) hosts)"
            else
              echo "No 404 hosts found, skipping"
              touch input.txt
            fi

          elif [ -f live_hosts.txt ] && [ -s live_hosts.txt ]; then
            cp live_hosts.txt input.txt
            echo "Using live_hosts.txt ($(wc -l < input.txt) hosts)"

          else
            cp domains.txt input.txt
            echo "Fallback to domains.txt ($(wc -l < input.txt) hosts)"
          fi

          echo "Total targets: $(wc -l < input.txt)"

      - name: Run katana
        if: inputs.use_katana == true
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          katana -list input.txt \
            -silent \
            -js-crawl \
            -depth 2 \
            -timeout 10 \
            -rl 50 \
            -concurrency 10 \
            -o urls.txt || true
          echo "URLs found: $(wc -l < urls.txt 2>/dev/null || echo 0)"

      - name: Run nuclei
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TEMPLATES_DIR="$HOME/.local/share/nuclei-templates"

          if [ "${{ inputs.use_katana }}" = "true" ] && [ -f urls.txt ] && [ -s urls.txt ]; then
            INPUT_FILE="urls.txt"
          else
            INPUT_FILE="input.txt"
          fi

          if [ ! -s "$INPUT_FILE" ]; then
            echo "No targets, skipping"
            touch results.txt
            exit 0
          fi

          TAGS_FLAG=""
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS_FLAG="-itags ${{ inputs.tags }}"
          fi

          if [ -d "custom-templates" ]; then
            T_FLAG="-t $TEMPLATES_DIR -t custom-templates"
          else
            T_FLAG="-t $TEMPLATES_DIR"
          fi

          timeout 21000 nuclei -l "$INPUT_FILE" \
            $T_FLAG \
            $TAGS_FLAG \
            -severity ${{ inputs.severity }} \
            -silent \
            -retries 1 \
            -timeout 10 \
            -bulk-size 25 \
            -concurrency 25 \
            -rate-limit 100 \
            -max-host-error 30 \
            -no-color \
            -o results.txt || true

          echo "Findings: $(wc -l < results.txt 2>/dev/null || echo 0)"

      - name: Show results
        if: always()
        run: |
          count=$(wc -l < results.txt 2>/dev/null || echo 0)
          echo "Total findings: $count"
          if [ "$count" -gt "0" ]; then cat results.txt; else echo "No findings"; fi

      - name: Check for results
        id: check
        run: |
          if [ -s results.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "count=$(wc -l < results.txt)" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Send email alert
        if: steps.check.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[${{ inputs.scan_name }}] ${{ steps.check.outputs.count }} Finding(s)"          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
