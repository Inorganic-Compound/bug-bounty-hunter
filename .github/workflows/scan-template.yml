name: Scan Template Engine

on:
  workflow_call:
    inputs:
      scan_name:
        required: true
        type: string
      tags:
        required: false
        type: string
        default: ''
      severity:
        required: false
        type: string
        default: 'low,medium,high,critical'
      cron_info:
        required: false
        type: string
        default: ''
      use_katana:
        required: false
        type: boolean
        default: false
      httpx_flags:
        required: false
        type: string
        default: '-silent'
      nuclei_input:
        required: false
        type: string
        default: 'live_hosts'
    secrets:
      EMAIL_USER:
        required: true
      EMAIL_PASS:
        required: true
      EMAIL_TO:
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Split subdomains into batches
        id: split
        run: |
          if [ -f subdomains1.txt ] && [ -s subdomains1.txt ]; then
            cat subdomains1.txt subdomains2.txt > input.txt
          else
            cp domains.txt input.txt
          fi
          total=$(wc -l < input.txt)
          num_batches=$(( (total + 199) / 200 ))
          batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
          echo "batches=$batches" >> $GITHUB_OUTPUT

  scan:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 85
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v1

      - name: Install tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          go install github.com/projectdiscovery/katana/cmd/katana@latest

      - name: Restore nuclei templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-weekly
          restore-keys: |
            nuclei-templates-${{ runner.os }}-

      - name: Split batch
        run: |
          start=$(( (${{ matrix.batch }} - 1) * 200 + 1 ))
          sed -n "${start},$((start + 199))p" input.txt > batch_hosts.txt

      - name: Run httpx
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          httpx -l batch_hosts.txt ${{ inputs.httpx_flags }} -timeout 5 -retries 0 -rl 150 -o live_hosts.txt || true

      - name: Run katana (if enabled)
        if: inputs.use_katana == true
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          katana -list live_hosts.txt -silent -js-crawl -depth 2 -timeout 10 -o urls.txt || true

      - name: Run nuclei
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          INPUT_FILE="${{ inputs.nuclei_input }}.txt"

          TAGS_FLAG=""
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS_FLAG="-tags ${{ inputs.tags }}"
          fi

          CUSTOM_FLAG=""
          if [ -d "custom-templates" ]; then
            CUSTOM_FLAG="-t custom-templates"
          fi

          timeout 4500 nuclei -l "$INPUT_FILE" \
            $TAGS_FLAG \
            $CUSTOM_FLAG \
            -severity ${{ inputs.severity }} \
            -silent -retries 1 -timeout 8 \
            -bulk-size 50 -concurrency 50 \
            -o results.txt || true

      - name: Check for results
        id: check
        run: |
          if [ -s results.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Send email
        if: steps.check.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[${{ inputs.scan_name }}] Finding - Batch ${{ matrix.batch }}"
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
