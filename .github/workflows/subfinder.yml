name: Weekly Subdomain Discovery
on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Split domains into batches of 50
        id: split
        run: |
          total=$(wc -l < domains.txt)
          num_batches=$(( (total + 49) / 50 ))
          batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
          echo "batches=$batches" >> $GITHUB_OUTPUT

  discover:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v1

      - name: Install subfinder
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest

      - name: Run subfinder on batch
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          start=$(( (${{ matrix.batch }} - 1) * 50 + 1 ))
          sed -n "${start},$((start + 49))p" domains.txt > batch_domains.txt
          subfinder -dL batch_domains.txt -silent -timeout 30 -t 10 -max-time 350 -o subs_raw.txt || true
          grep -vP '^\d+[-\.]\d+[-\.]\d+[-\.]\d+\.' subs_raw.txt > batch_subs.txt || true

      - name: Upload batch results
        uses: actions/upload-artifact@v4
        with:
          name: subs-batch-${{ matrix.batch }}
          path: batch_subs.txt
          if-no-files-found: warn

  combine_subs:
    needs: [prepare, discover]
    runs-on: ubuntu-latest
    outputs:
      httpx_batches: ${{ steps.split.outputs.httpx_batches }}
    if: ${{ always() && needs.prepare.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_subs

      - name: Combine and deduplicate
        run: |
          find all_subs -name "*.txt" | xargs cat 2>/dev/null | \
          sort -u | \
          grep -v '^\*\.' | \
          grep -vE '^[0-9]{1,3}\.[0-9]' | \
          grep -vE '^[a-f0-9]{32}\.' > all_subdomains_clean.txt || true
          total=$(wc -l < all_subdomains_clean.txt)
          half=$(( total / 2 ))
          head -n $half all_subdomains_clean.txt > subdomains1.txt
          tail -n +$((half + 1)) all_subdomains_clean.txt > subdomains2.txt
          echo "Total: $total"
          echo "File 1: $(wc -l < subdomains1.txt)"
          echo "File 2: $(wc -l < subdomains2.txt)"

      - name: Split subdomains for httpx
        id: split
        run: |
          total=$(wc -l < all_subdomains_clean.txt)
          num_batches=$(( (total + 49999) / 50000 ))
          httpx_batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
          echo "httpx_batches=$httpx_batches" >> $GITHUB_OUTPUT
          echo "Total httpx batches: $num_batches"

      - name: Commit subdomains
        run: |
          git config --global user.email "bugbountybot@github.com"
          git config --global user.name "BugBountyBot"
          git add subdomains1.txt subdomains2.txt
          git diff --staged --quiet || git commit -m "Weekly subdomain update $(date +'%Y-%m-%d')"
          git push

      - name: Upload clean subdomains for httpx jobs
        uses: actions/upload-artifact@v4
        with:
          name: all-subdomains-clean
          path: all_subdomains_clean.txt

  httpx_scan:
    needs: combine_subs
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ always() && needs.combine_subs.result == 'success' }}
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJson(needs.combine_subs.outputs.httpx_batches) }}
    steps:
      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v1

      - name: Install httpx
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/httpx/cmd/httpx@latest

      - name: Download subdomains
        uses: actions/download-artifact@v4
        with:
          name: all-subdomains-clean

      - name: Run httpx on batch
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          start=$(( (${{ matrix.batch }} - 1) * 50000 + 1 ))
          sed -n "${start},$((start + 49999))p" all_subdomains_clean.txt > batch_subs.txt
          httpx -l batch_subs.txt \
            -silent \
            -timeout 5 \
            -retries 0 \
            -rl 300 \
            -threads 100 \
            -o batch_live.txt || true
          echo "Live hosts in batch ${{ matrix.batch }}: $(wc -l < batch_live.txt)"

      - name: Upload live hosts
        uses: actions/upload-artifact@v4
        with:
          name: live-batch-${{ matrix.batch }}
          path: batch_live.txt
          if-no-files-found: warn

  combine_hosts:
    needs: [combine_subs, httpx_scan]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.combine_subs.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all live host artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_live
          pattern: live-batch-*

      - name: Combine live hosts
        run: |
          find all_live -name "*.txt" | xargs cat 2>/dev/null | \
          sort -u > live_hosts.txt || true
          echo "Total live hosts: $(wc -l < live_hosts.txt)"

      - name: Commit live hosts
        run: |
          git config --global user.email "bugbountybot@github.com"
          git config --global user.name "BugBountyBot"
          git add live_hosts.txt
          git diff --staged --quiet || git commit -m "Weekly live hosts update $(date +'%Y-%m-%d')"
          git push
